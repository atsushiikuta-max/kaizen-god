const NG = ['予防保全','定期交換','定期点検','オーバーホール'];
const SESSION_N = 5;

/* ===== 採点（オフライン・ルールベース） ===== */
const norm = s => (s||'').toLowerCase().replace(/\s+/g,'').replace(/[、。・，．]/g,'');
function grade(q, ans){
  const a = norm(ans);
  const matched=[], missed=[];
  let keyCovered=false;
  q.points.forEach(p=>{
    const hit = p.kw.some(k => a.includes(norm(k)));
    if(hit){ matched.push(p); if(p.key) keyCovered=true; }
    else missed.push(p);
  });
  const ngHits = NG.filter(n => a.includes(norm(n)));
  const N = q.points.length;
  const ratio = matched.length / N;
  let s = 40 + ratio*50 + (keyCovered?10:0) - ngHits.length*15;
  if(matched.length===0) s = Math.min(s, ans.trim().length>10?22:5);
  s = Math.max(0, Math.min(100, Math.round(s)));
  return {score:s, matched, missed, keyCovered, ngHits};
}

          <div className="font-bold" style={{color:'#16a34a'}}>◎ 良かった点</div>
          <ul className="mt-1 space-y-1">
            {fb.matched.map((p,i)=><li key={i} className="text-sm wmark"><Chip c={p.c}/>{p.t}</li>)}
          </ul>
        </div>
      )}

      {!fb.keyCovered && (
        <div className="mt-4 p-3 rounded-xl" style={{background:'#fff7ed',border:'1px solid #fed7aa'}}>
          <div className="font-bold text-orange-700">⚠ 最重要の視点が抜けています</div>
          <div className="text-sm text-slate-700 mt-1">
            今回の最重要は <Chip c={q.keyConcept}/> です。
            {q.keyConcept==='品番切替'
              ? ' CTヒストグラムで山が2つある時は、まず「品番切替が適切か（iXacsの品番切替操作・設定CTの混在）」を疑います。'
              : ' この観点の改善案を必ず入れましょう。'}
          </div>
        </div>
      )}

      {fb.missed.length>0 && (
        <div className="mt-4">
          <div className="font-bold text-slate-700">＋ 他に考えられる改善案（模範例）</div>
          <ul className="mt-1 space-y-1">
            {fb.missed.map((p,i)=><li key={i} className="text-sm text-slate-600 wmark"><Chip c={p.c}/>{p.t}</li>)}
          </ul>
        </div>
      )}

      {fb.ngHits.length>0 && (
        <div className="mt-4 p-3 rounded-xl" style={{background:'#fef2f2',border:'1px solid #fecaca'}}>
          <div className="font-bold text-rose-700">✕ 予防保全はNG（−{fb.ngHits.length*15}点）</div>
          <div className="text-sm text-slate-700 mt-1">当社の方針として予防保全は行いません（{fb.ngHits.join('、')}）。原因の修理・設定の適正化は「管理をする」としてOKです。</div>
        </div>
      )}

      <div className="mt-4 text-xs text-slate-500">
        見るべきiXacsグラフ：{q.graphs.map(g=> <span key={g} className="inline-block bg-sky-50 text-sky-700 border border-sky-200 rounded px-2 py-0.5 mr-1">{g}</span>)}
      </div>

      <div className="text-center mt-5">
        <button onClick={onNext} className="btn px-10 py-3 text-white" style={{background:'linear-gradient(90deg,#f97316,#fb923c)'}}>
          {idx+1>=total ? '総合結果へ' : '次の問題へ'}
        </button>
      </div>
    </div>
  );
}

/* ===== 総評 ===== */
function Summary({player, results, onRanking, onRetry}){
  const avg = Math.round(results.reduce((s,r)=>s+r.score,0)/results.length);
  const r = rankOf(avg);
  return (
    <div className="max-w-2xl mx-auto px-4 py-10 text-center">
      <div className="text-6xl">{r.ic}</div>
      <div className="text-sm text-slate-500 mt-2">{player.dept} ／ {player.name} さんの称号</div>
      <div className="text-4xl font-black mt-1" style={{color:r.c}}>{r.nm}</div>

      <div className="card p-6 mt-7 inline-block">
        <div className="text-slate-500 text-sm">総合（平均点）</div>
        <div className="text-5xl font-black" style={{color:'#16a34a'}}>{avg}</div>
        <div className="text-slate-500 text-sm">/ 100点</div>
      </div>

      <div className="card p-5 mt-5 text-left">
        <div className="font-bold text-slate-700 mb-2">各問の点数</div>
        {results.map((x,i)=>(
          <div key={i} className="flex justify-between border-b border-slate-100 py-1 text-sm">
            <span>第{i+1}問</span><span className="font-bold">{x.score}点</span>
          </div>
        ))}
      </div>

      <div className="flex gap-3 justify-center mt-7">
        <button onClick={onRanking} className="btn px-6 py-3 text-white" style={{background:'linear-gradient(90deg,#0ea5e9,#22c55e)'}}>🏅 ランキングを見る</button>
        <button onClick={onRetry} className="btn px-6 py-3 border border-slate-300 bg-white text-slate-700">もう一度</button>
      </div>
    </div>
  );
}

/* ===== ランキング（個人・部署別） ===== */
function Ranking({me, onBack}){
  const lb = loadLB();
  const indiv = lb.slice().sort((a,b)=> b.avg-a.avg || b.date-a.date).slice(0,20);
  const byDept = {};
  lb.forEach(e=>{ (byDept[e.dept]=byDept[e.dept]||[]).push(e.avg); });
  const dept = Object.keys(byDept).map(d=>{
    const arr=byDept[d]; const avg=Math.round(arr.reduce((s,v)=>s+v,0)/arr.length);
    return {dept:d, avg, n:arr.length, best:Math.max(...arr)};
  }).sort((a,b)=> b.avg-a.avg);

  return (
    <div className="max-w-2xl mx-auto px-4 py-8">
      <div className="flex items-center justify-between">
        <h1 className="text-2xl font-black text-slate-800">🏅 ランキング</h1>
        <button onClick={onBack} className="btn px-4 py-2 border border-slate-300 bg-white text-slate-600">戻る</button>
      </div>

      <div className="card p-5 mt-4">
        <div className="font-bold text-slate-700 mb-2">部署別ランキング（平均点）</div>
        {dept.length===0 && <div className="text-slate-400 text-sm">まだ記録がありません。</div>}
        {dept.map((d,i)=>(
          <div key={d.dept} className={`flex items-center justify-between py-2 border-b border-slate-100 ${me&&me.dept===d.dept?'bg-amber-50 rounded':''}`}>
            <span className="font-bold w-8 text-center">{i+1}</span>
            <span className="flex-1">{d.dept} <span className="text-xs text-slate-400">({d.n}件)</span></span>
            <span className="font-black text-emerald-600">{d.avg}点</span>
          </div>
        ))}
      </div>

      <div className="card p-5 mt-5">
        <div className="font-bold text-slate-700 mb-2">個人ランキング（上位20）</div>
        {indiv.length===0 && <div className="text-slate-400 text-sm">まだ記録がありません。</div>}
        {indiv.map((e,i)=>{
          const r=rankOf(e.avg);
          const isMe = me && e._id===me._id;
          return (
            <div key={i} className={`flex items-center justify-between py-2 border-b border-slate-100 ${isMe?'bg-amber-50 rounded':''}`}>
              <span className="font-bold w-8 text-center">{i+1}</span>
              <span className="flex-1">{e.name} <span className="text-xs text-slate-400">{e.dept}</span></span>
              <span className="text-xs mr-2" style={{color:r.c}}>{r.ic}{r.nm}</span>
              <span className="font-black text-emerald-600">{e.avg}点</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ===== 本体 ===== */
function App(){
  const [phase,setPhase] = useState('start'); // start|quiz|summary|ranking
  const [back,setBack] = useState('start');
  const [player,setPlayer] = useState(null);
  const [session,setSession] = useState([]);
  const [idx,setIdx] = useState(0);
  const [results,setResults] = useState([]);
  const [me,setMe] = useState(null);

  const start = (p) => {
    setPlayer(p); setSession(shuffle(QUESTIONS).slice(0,SESSION_N));
    setIdx(0); setResults([]); setMe(null); setPhase('quiz');
  };
  const onDone = (res) => {
    const all = [...results, res];
    setResults(all);
    if(idx+1 >= session.length){
      const avg = Math.round(all.reduce((s,r)=>s+r.score,0)/all.length);
      const entry = {_id:'e'+Date.now()+Math.floor(Math.random()*1000), name:player.name, dept:player.dept, avg, date:Date.now(), n:all.length};
      saveEntry(entry); setMe(entry); setPhase('summary');
    } else { setIdx(idx+1); }
  };

  if(phase==='start') return <Start onStart={start} onRanking={()=>{setBack('start');setPhase('ranking');}}/>;
  if(phase==='ranking') return <Ranking me={me} onBack={()=>setPhase(back)}/>;
  if(phase==='summary') return <Summary player={player} results={results}
     onRanking={()=>{setBack('summary');setPhase('ranking');}} onRetry={()=>setPhase('start')}/>;

  // quiz
  const totalScore = results.reduce((s,r)=>s+r.score,0);
  return <Quiz key={idx} q={session[idx]} idx={idx} total={session.length} score={totalScore} player={player} onDone={onDone}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
