const KPI_BASE = {rieki:6.5, nouki:72, furyo:8.5, seisan:58};
function calcKPI(results){
  let k = {...KPI_BASE};

    k.rieki+=d*1.5; k.nouki+=d*4; k.furyo-=d*1.2; k.seisan+=d*4; });

    rieki:Math.max(0,Math.min(30,k.rieki)), nouki:Math.max(0,Math.min(100,k.nouki)),
    furyo:Math.max(0,Math.min(20,k.furyo)), seisan:Math.max(0,Math.min(100,k.seisan)),

}

const norm = s => (s||'').toLowerCase().replace(/\s+/g,'').replace(/[、。・，．]/g,'');
function grade(q, ans){
  const a = norm(ans);
  const matched=[], missed=[]; let keyCovered=false;
  q.points.forEach(p=>{ const hit=p.kw.some(k=>a.includes(norm(k)));
    if(hit){ matched.push(p); if(p.key) keyCovered=true; } else missed.push(p); });
  const ngHits = NG.filter(n=>a.includes(norm(n)));
  const ratio = matched.length / q.points.length;
  let s = 40 + ratio*50 + (keyCovered?10:0) - ngHits.length*15;
  if(matched.length===0) s = Math.min(s, ans.trim().length>10?22:5);
  s = Math.max(0, Math.min(100, Math.round(s)));
  return {score:s, matched, missed, keyCovered, ngHits};
}

/* 「異なる上位概念の対策を一つずつ・合計3つ」用の評価。
   回答が何種類の上位概念の対策をカバーできているかで採点する。 */
const MULTI_PROMPT = 'この設備・現象に対して、異なる上位概念の対策を「一つずつ・合計3つ」挙げてください。\n（例：待ちを無くす→電源OFF ／ 要るの？→工程廃止 ／ 管理をする→流量適正化）';
// 1項目（1行）＝1つの上位概念として判定する。1つの対策が複数概念に二重カウントされるのを防ぐ。
function conceptOfLine(line){
  const a = norm(line);
  const keys = Object.keys(CONCEPT_BANK);
  // ① 明示的に上位概念名が書かれていればそれを採用
  for(const c of keys){
    if(a.includes(norm(c))){
      let t = CONCEPT_BANK[c][0].t;
      for(const p of CONCEPT_BANK[c]){ if(p.kw.some(k=>a.includes(norm(k)))){ t=p.t; break; } }
      return {c, t};
    }
  }
  // ② キーワード一致が最も多い概念を1つだけ採用
  let best=null,bestN=0,bestT=null;
  keys.forEach(c=>{
    let n=0,t=null;
    for(const p of CONCEPT_BANK[c]){ const hit=p.kw.filter(k=>a.includes(norm(k))).length; if(hit>0){ n+=hit; if(!t)t=p.t; } }
    if(n>bestN){ bestN=n; best=c; bestT=t; }
  });
  return best?{c:best,t:bestT}:null;
}
function gradeMulti(ans, target){
  target = target||3;
  const lines = ans.split(/\n+/).map(s=>s.trim()).filter(Boolean);
  const items = lines.length>=2 ? lines : ans.split(/[、,／\/]+/).map(s=>s.trim()).filter(Boolean);
  const seen=new Set(), covered=[];
  items.forEach(line=>{ const r=conceptOfLine(line); if(r && !seen.has(r.c)){ seen.add(r.c); covered.push(r); } });
  const ngHits = NG.filter(n=>norm(ans).includes(norm(n)));
  const distinct = covered.length;
  let s = distinct>=target ? 92+Math.min(8,(distinct-target)*4) : Math.round(distinct/target*80)+(distinct>0?10:0);
  s -= ngHits.length*15;
  s = Math.max(0, Math.min(100, Math.round(s)));
  const have = covered.map(x=>x.c);
  const missing = Object.keys(CONCEPT_BANK).filter(c=>have.indexOf(c)<0);
  return {multi:true, score:s, covered, distinct, target, missing, ngHits};
}

const shuffle = arr => { const a=arr.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; };

/* 1問ごとに上位概念を変えて出題（3問すべて異なるkeyConcept）。
   さらに必ず1問は「グラフの読み方」を含める（3回に1回はグラフ問題）。 */
function pickSession(){
  const byC={}; POOL.forEach(q=>{ (byC[q.keyConcept]=byC[q.keyConcept]||[]).push(q); });
  const out=[], used={};
  // 必ず1問はグラフ問題。うち約半分はCTヒストグラムを保証（他のグラフ種に埋もれないように）。
  const graphs = POOL.filter(q=>q.type==='グラフの読み方');
  const hists  = graphs.filter(q=>q.graph && q.graph.kind==='hist');
  const others = graphs.filter(q=>!(q.graph && q.graph.kind==='hist'));
  let pickFrom = graphs;
  if(hists.length && others.length) pickFrom = (Math.random()<0.5 ? hists : others);
  else if(hists.length) pickFrom = hists;
  if(pickFrom.length){ const g=pickFrom[Math.floor(Math.random()*pickFrom.length)]; out.push(g); used[g.keyConcept]=1; }
  const concepts=shuffle(Object.keys(byC).filter(c=>!used[c]));
  for(const c of concepts){ if(out.length>=SESSION_N) break; const qs=byC[c]; out.push(qs[Math.floor(Math.random()*qs.length)]); }
  return shuffle(out).slice(0,SESSION_N);
}

/* ============ SVG チャート（見るべきグラフの図解） ============ */
function HistChart({variant,spec}){
  const W=560,H=200,padL=30,padB=22,padT=8,padR=8;
  const cfgs={
    bimodal:{min:36,max:48,mean:39.5,std:1.0,peak:16,m2:45,setCT:37,warnCT:44},
    shiftRight:{min:36,max:48,mean:42,std:1.4,peak:16,m2:null,setCT:37,warnCT:44},
    shiftLeft:{min:33,max:46,mean:35.4,std:0.9,peak:16,m2:null,setCT:37,warnCT:44},
    wide:{min:34,max:48,mean:40,std:2.6,peak:11,m2:null,setCT:37,warnCT:44},
  };
  const base=cfgs[variant]||{min:36,max:48,mean:40,std:1.4,peak:16,m2:null,setCT:37,warnCT:44};
  const cfg=spec?Object.assign({},base,spec):base;
  const {min,max,mean,std,peak,m2,setCT,warnCT}=cfg, r2=cfg.m2ratio||0.9;
  const step=(max-min)/90;
  const bins=[]; for(let x=min;x<=max+1e-9;x+=step){
    const i=Math.round((x-min)/step);
    let g=Math.exp(-((x-mean)**2)/(2*std*std));
    if(m2!=null) g=Math.max(g, r2*Math.exp(-((x-m2)**2)/(2*std*std)));
    const jit=0.8+0.2*Math.abs((Math.sin(i*12.9898)*43758.5453)%1);
    bins.push({x,c:Math.max(0,Math.round(peak*g*jit))});
  }
  const pw=W-padL-padR, ph=H-padT-padB, bw=pw/bins.length, mx=Math.max(...bins.map(b=>b.c),1);
  const xF=v=>padL+((v-min)/(max-min))*pw;
  return (
   <svg viewBox={`0 0 ${W} ${H}`} className="chart">
    {bins.map((b,i)=>{const y=padT+ph-(b.c/mx)*ph;return <rect key={i} x={padL+i*bw} y={y} width={Math.max(1,bw-1)} height={padT+ph-y} fill="#aac8ec"/>;})}
    <line x1={xF(setCT)} y1={padT} x2={xF(setCT)} y2={padT+ph} stroke="#1f4e9e" strokeDasharray="4 3"/>
    <text x={xF(setCT)+3} y={padT+11} style={{fontSize:10,fill:'#1f4e9e',fontWeight:700}}>設定CT {setCT}</text>
    <line x1={xF(warnCT)} y1={padT} x2={xF(warnCT)} y2={padT+ph} stroke="#c92a2a" strokeDasharray="4 3"/>
    <text x={xF(warnCT)-3} y={padT+11} textAnchor="end" style={{fontSize:10,fill:'#c92a2a',fontWeight:700}}>警告CT {warnCT}</text>
    {[min,mean,max].map((v,i)=><text key={i} x={xF(v)} y={H-6} textAnchor="middle" className="ax">{v.toFixed(1)}</text>)}
   </svg>
  );
}

function LineChart({pattern,baseline}){

         <button disabled={!dept} onClick={()=>onStart({dept,name:name.trim()||'名無し'})} className="btn px-10 py-4 text-lg text-white" style={{background:dept?'linear-gradient(90deg,#f97316,#fb923c)':'#cbd5e1'}}>ゲームスタート</button>
         {!dept && <div className="text-xs text-rose-500 mt-2">部署を選択してください</div>}
       </div>
     </div>
     <div className="card p-5 mt-5">
       <div className="font-bold text-slate-700 mb-2">📖 上位概念（観察の型）— 迷ったらこれで分類</div>
       <LensRef/>
     </div>
     <div className="text-center mt-5"><button onClick={onRanking} className="btn px-6 py-2 border border-slate-300 bg-white text-slate-700">🏅 ランキングを見る</button></div>
   </div>
  );
}

/* ===== クイズ ===== */
function Quiz({q,idx,total,results,onDone}){
  const [ans,setAns]=useState(''); const [fb,setFb]=useState(null);
  const multi = q.format==='multi';
  const target = q.target||3;
  const submit=()=>{ if(fb||ans.trim().length===0)return; setFb(multi?gradeMulti(ans,target):grade(q,ans)); };
  return (
   <div className="max-w-6xl mx-auto px-4 py-6 grid lg:grid-cols-4 gap-4 items-start">
     {/* 左：上位概念（縦並び・常時表示） */}
     <div className="lg:col-span-1 order-2 lg:order-1">
       <div className="card p-3 lg:sticky lg:top-4">
         <div className="font-bold text-slate-700 text-sm mb-2">📖 上位概念（観察の型）</div>
         <LensRef vertical/>
       </div>
     </div>
     {/* 中央：問題 */}
     <div className="lg:col-span-2 order-1 lg:order-2">
       <div className="flex items-center justify-between text-sm">
         <div className="font-bold text-slate-500">第 {idx+1} / {total} 問 ｜ {q.type}</div>
       </div>
       <div className="h-1.5 bg-slate-100 rounded-full mt-2 overflow-hidden"><div className="h-full" style={{width:`${(idx/total)*100}%`,background:'linear-gradient(90deg,#0ea5e9,#22c55e)'}}/></div>

       <div className="card p-5 mt-3 pop">
         <div className="text-xs font-bold text-slate-400">設 備</div>
         <div className="text-2xl font-black text-slate-900 wmark">{q.setsubi}</div>
         {(q.kotei||q.nerai) && <div className="text-base font-bold text-slate-600 mt-1 wmark">{q.kotei?`工程：${q.kotei}`:''}{q.kotei&&q.nerai?'　／　':''}{q.nerai?`狙い：${q.nerai}`:''}</div>}
         {q.lens && !multi && <div className="mt-3"><div className="text-xs font-bold text-slate-400">上位概念</div><Chip c={q.lens}/></div>}
         {q.genshou && <div className="mt-3"><div className="text-xs font-bold text-slate-400">現 象</div><ul className="list-disc pl-5 text-slate-700">{q.genshou.map((g,i)=><li key={i} className="wmark">{g}</li>)}</ul></div>}
         {q.graph && <div className="mt-3"><div className="text-xs font-bold text-slate-400 mb-1">グラフ</div><GraphView graph={q.graph} hideNote/></div>}
         <div className="mt-4 p-3 rounded-xl wmark" style={{background:'#eff6ff',borderLeft:'4px solid #2563eb'}}><span className="font-bold text-slate-800 text-base">{q.toi}</span></div>
       </div>

       <div className="mt-3">
         <div className="text-xs text-slate-500 mb-1">{multi?`あなたの回答（異なる上位概念の対策を1行ずつ、合計${target}つ以上。「上位概念：対策」の形がおすすめ）`:(q.format==='single'?'あなたの回答（この上位概念の改善案を1行ずつ挙げてください）':'あなたの回答（考えられる要因・確認すべきことを挙げてください）')}</div>
         <textarea value={ans} onChange={e=>setAns(e.target.value)} disabled={!!fb} rows={6} placeholder={multi?'例）待ちを無くす：昼休み・終業後に電源OFF\n要るの？：不要なエアーブロー工程を廃止\n管理をする：圧力・流量を適正化する':(q.format==='single'?'例）動作ストロークを短くする\n起動スイッチを近くに移動する':'例）標準作業を守れているか／品番切替が正しいか／作業者差…')} className="w-full border border-slate-300 rounded-xl p-3 wmark"/>
       </div>

       {!fb ? (
         <div className="text-center mt-4"><button disabled={ans.trim().length===0} onClick={submit} className="btn px-10 py-3 text-white" style={{background:ans.trim()?'linear-gradient(90deg,#0ea5e9,#22c55e)':'#cbd5e1'}}>採点する</button></div>
       ) : (
         <Feedback q={q} fb={fb} idx={idx} total={total} onNext={()=>onDone({qid:q.id,type:q.type,keyConcept:q.keyConcept,keyCovered:fb.multi?(fb.distinct>=(fb.target||3)):fb.keyCovered,score:fb.score})}/>
       )}
     </div>
     {/* 右：経営ダッシュボード */}
     <div className="lg:col-span-1 order-3"><Dashboard results={results} idx={idx}/></div>
   </div>
  );
}

/* ===== フィードバック ===== */
function Feedback({q,fb,idx,total,onNext}){
  const cls=fb.score>=80?'#16a34a':fb.score>=60?'#2563eb':'#ea580c';
  const cases=(q.cases||[]).map(id=>CASES[id]).filter(Boolean);
  return (
   <div className="card p-5 mt-4 pop">
     <div className="text-center"><span className="text-5xl font-black" style={{color:cls}}>{fb.score}</span><span className="text-slate-500 font-bold"> / 100点</span>{fb.multi
       ? <span className="text-sm font-bold ml-2" style={{color:fb.distinct>=fb.target?'#16a34a':'#ea580c'}}>異なる上位概念 {fb.distinct}/{fb.target}</span>
       : <span className="text-sm text-slate-400 ml-2">(改善額 {yfmt(yenOf(fb.score))})</span>}</div>

     {fb.multi ? (
       <div>
         {fb.covered.length>0 && (<div className="mt-4"><div className="font-bold" style={{color:'#16a34a'}}>✅ 使えた上位概念（{fb.distinct}種類）</div><ul className="mt-1 space-y-1">{fb.covered.map((x,i)=><li key={i} className="text-sm wmark"><Chip c={x.c}/>{x.t}</li>)}</ul></div>)}
         {fb.distinct<fb.target
           ? (<div className="mt-4 p-3 rounded-xl" style={{background:'#fff7ed',border:'1px solid #fed7aa'}}><div className="font-bold text-orange-700">⚠ あと{fb.target-fb.distinct}個、別の上位概念の対策を挙げましょう</div><div className="text-xs text-slate-500 mt-1">{q.matrixRef?`「${q.matrixRef}」での具体例（まだ使っていない上位概念）：`:'例（まだ使っていない上位概念）：'}</div><ul className="mt-1 space-y-1">{fb.missing.slice(0,5).map((c,i)=><li key={i} className="text-sm text-slate-700 wmark"><Chip c={c}/>{suggestFor(q.matrixRef,c)}</li>)}</ul></div>)
           : (<div className="mt-4 p-3 rounded-xl text-emerald-700 font-bold" style={{background:'#ecfdf5',border:'1px solid #a7f3d0'}}>◎ {fb.target}つ以上の異なる上位概念で対策できています！素晴らしい！</div>)}
       </div>
     ) : (
       <div>
         {fb.matched.length>0 && (<div className="mt-4"><div className="font-bold" style={{color:'#16a34a'}}>◎ 良かった点</div><ul className="mt-1 space-y-1">{fb.matched.map((p,i)=><li key={i} className="text-sm wmark"><Chip c={p.c}/>{p.t}</li>)}</ul></div>)}
         {!fb.keyCovered && (<div className="mt-4 p-3 rounded-xl" style={{background:'#fff7ed',border:'1px solid #fed7aa'}}><div className="font-bold text-orange-700">⚠ 最重要の視点が抜けています</div><div className="text-sm text-slate-700 mt-1">今回の最重要は <Chip c={q.keyConcept}/> です。{q.keyConcept==='品番切替'?' CTヒストグラムで山が2つある時は、まず「品番切替が適切か」を疑います。':' この観点の改善案を必ず入れましょう。'}</div></div>)}
         {fb.missed.length>0 && (<div className="mt-4"><div className="font-bold text-slate-700">＋ 他に考えられる改善案（模範例）</div><ul className="mt-1 space-y-1">{fb.missed.map((p,i)=><li key={i} className="text-sm text-slate-600 wmark"><Chip c={p.c}/>{p.t}</li>)}</ul></div>)}
       </div>
     )}

     {fb.ngHits.length>0 && (<div className="mt-4 p-3 rounded-xl" style={{background:'#fef2f2',border:'1px solid #fecaca'}}><div className="font-bold text-rose-700">✕ 予防保全はNG（−{fb.ngHits.length*15}点）</div><div className="text-sm text-slate-700 mt-1">当社の方針として予防保全は行いません（{fb.ngHits.join('、')}）。原因の修理・設定の適正化は「管理をする」としてOKです。</div></div>)}

     {q.graph && q.graph.note && (
       <div className="mt-4 p-3 rounded-xl" style={{background:'#f8fafc',border:'1px solid #e2e8f0'}}>
         <div className="font-bold text-slate-700 mb-1">📈 グラフの見方（ここを見る）</div>
         <div className="text-sm wmark" style={{color:'#b45309'}}>👀 {q.graph.note}</div>
       </div>
     )}

     {q.reveal && (
       <div className="mt-4">
         <div className="font-bold text-slate-700 mb-2">💡 実際の改善事例（{q.reveal.id}）— 改善前後の写真つき</div>
         <div className="rounded-xl border border-slate-200 p-3">
           <div className="flex items-center justify-between"><Chip c={q.keyConcept}/><span className="text-xs font-bold text-emerald-600">{yfmt(q.reveal.yen)}/年</span></div>
           <div className="font-bold text-sm mt-1 wmark">{q.reveal.title}</div>
           {q.reveal.img && <img src={q.reveal.img} alt="改善事例（改善前後）" className="w-full rounded-lg border border-slate-200 mt-2"/>}
           <div className="text-xs text-slate-600 mt-2 wmark">{q.reveal.summary}</div>
         </div>
       </div>
     )}

     {cases.length>0 && (
       <div className="mt-4">
         <div className="font-bold text-slate-700 mb-2">💡 参考になる実際の改善事例</div>
         <div className="grid sm:grid-cols-2 gap-3">
           {cases.map((c,i)=>(
             <div key={i} className="rounded-xl border border-slate-200 p-3">
               <div className="flex items-center justify-between"><Chip c={c.concept}/><span className="text-xs font-bold text-emerald-600">{yfmt(c.yen)}/年</span></div>
               <div className="font-bold text-sm mt-1 wmark">{c.title}</div>
               <div className="text-xs text-slate-400">{c.setsubi}</div>
               <div className="flex gap-2 mt-2">{c.imgs.map((im,j)=>(<figure key={j} className="flex-1 m-0"><img src={im.src} alt={im.cap} className="w-full rounded border border-slate-200"/><figcaption className="text-[10px] text-slate-500 mt-0.5 wmark">{im.cap}</figcaption></figure>))}</div>
               <div className="text-xs text-slate-600 mt-2 wmark">{c.summary}</div>
             </div>
           ))}
         </div>
       </div>
     )}

     <div className="text-center mt-5"><button onClick={onNext} className="btn px-10 py-3 text-white" style={{background:'linear-gradient(90deg,#f97316,#fb923c)'}}>{idx+1>=total?'結果・役職判定へ':'次の問題へ'}</button></div>
   </div>
  );
}

/* ===== 弱点評価 ===== */
function weakness(results){
  const byType={}; results.forEach(r=>{(byType[r.type]=byType[r.type]||[]).push(r.score);});
  let worstType=null,worstAvg=101;
  Object.keys(byType).forEach(t=>{const a=byType[t].reduce((s,v)=>s+v,0)/byType[t].length; if(a<worstAvg){worstAvg=a;worstType=t;}});
  const keyMiss={}; results.forEach(r=>{ if(!r.keyCovered){keyMiss[r.keyConcept]=(keyMiss[r.keyConcept]||0)+1;} });
  const missConcepts=Object.keys(keyMiss).sort((a,b)=>keyMiss[b]-keyMiss[a]);
  return {worstType,worstAvg:Math.round(worstAvg),missConcepts,keyMiss};
}

/* ===== 総評 ===== */
function Summary({player,results,clearedAll,onRanking,onRetry}){
  const avg=Math.round(results.reduce((s,r)=>s+r.score,0)/results.length);
  const rk=rankOf(avg); const w=weakness(results);
  const yen=results.reduce((s,r)=>s+yenOf(r.score),0);
  return (
   <div className="max-w-2xl mx-auto px-4 py-10 text-center">
     {clearedAll && <div className="text-emerald-600 font-black mb-2">🎉 全{SESSION_N}問クリア！あなたの役職は…</div>}
     <div className="text-6xl">{rk.ic}</div>
     <div className="text-sm text-slate-500 mt-2">{player.dept} ／ {player.name} さんの称号</div>
     <div className="text-4xl font-black mt-1" style={{color:rk.c}}>{rk.nm}</div>

     <div className="flex gap-3 justify-center mt-6 flex-wrap">
       <div className="card p-5"><div className="text-slate-500 text-sm">総合（平均点）</div><div className="text-4xl font-black text-emerald-600">{avg}</div></div>
       <div className="card p-5"><div className="text-slate-500 text-sm">累計改善額</div><div className="text-4xl font-black text-sky-600">{yfmt(yen)}</div></div>
     </div>

     <div className="card p-5 mt-5 text-left">
       <div className="font-bold text-slate-700 mb-2">🔎 ここが弱いです（弱点分析）</div>
       {w.missConcepts.length>0
        ? <div className="text-sm text-slate-700">最重要視点の取りこぼし： {w.missConcepts.map(c=><Chip key={c} c={c}/>)}<div className="text-xs text-slate-500 mt-1">この視点が問われた時に改善案を出せていません。{w.missConcepts.includes('待ちを無くす')&&'電力問題は「動いていないのに電気を使っていないか？」で考えると見つかります。'}{w.missConcepts.includes('品番切替')&&'CTヒストグラムで山が2つの時は、まず品番切替を疑いましょう。'}</div></div>
        : <div className="text-sm text-emerald-700">最重要視点はすべて押さえられています。素晴らしい！</div>}
       <div className="text-sm text-slate-700 mt-3">最も苦手な出題タイプ： <b>{w.worstType}</b>（平均 {w.worstAvg}点）</div>
       <div className="text-xs text-slate-500 mt-2">ヒント：電力→「待ちを無くす」／CT→「待ちを無くす・同時に行う・距離を短く」／品質→「同時に行う・気遣いを無くす」で考える癖をつけましょう。</div>
     </div>

     <div className="card p-5 mt-5 text-left">
       <div className="font-bold text-slate-700 mb-2">各問の点数</div>
       {results.map((x,i)=>(<div key={i} className="flex justify-between border-b border-slate-100 py-1 text-sm"><span>第{i+1}問 <span className="text-slate-400">{x.type}</span></span><span className="font-bold">{x.score}点</span></div>))}
     </div>

     <div className="flex gap-3 justify-center mt-7"><button onClick={onRanking} className="btn px-6 py-3 text-white" style={{background:'linear-gradient(90deg,#0ea5e9,#22c55e)'}}>🏅 ランキングを見る</button><button onClick={onRetry} className="btn px-6 py-3 border border-slate-300 bg-white text-slate-700">もう一度</button></div>
   </div>
  );
}

/* ===== ランキング（個人＋部署別合計を同時表示） ===== */
function Ranking({me,onBack}){
  const [lb,setLb]=useState(null);
  useEffect(()=>{ let on=true; (async()=>{
    const shared=await fetchShared(); const map={};
    shared.forEach(e=>{ if(e&&e._id) map[e._id]=e; });
    if(me && me._id && !map[me._id]) map[me._id]=me; // 自分の直近結果は即反映（共有反映前の保険）
    if(on) setLb(Object.values(map));
  })(); return ()=>{on=false;}; },[]);
  if(lb===null) return (<div className="max-w-4xl mx-auto px-4 py-8"><div className="flex items-center justify-between"><h1 className="text-2xl font-black text-slate-800">🏅 ランキング</h1><button onClick={onBack} className="btn px-4 py-2 border border-slate-300 bg-white text-slate-600">戻る</button></div><div className="text-slate-400 mt-10 text-center">読み込み中…</div></div>);
  const indiv=lb.slice().sort((a,b)=>b.avg-a.avg||b.date-a.date).slice(0,20);
  const agg={}; lb.forEach(e=>{const g=agg[e.dept]=agg[e.dept]||{sum:0,n:0,best:0}; g.sum+=e.avg; g.n++; g.best=Math.max(g.best,e.avg);});
  const deptSum=Object.keys(agg).map(d=>({dept:d,sum:agg[d].sum,n:agg[d].n,avg:Math.round(agg[d].sum/agg[d].n)})).sort((a,b)=>b.sum-a.sum);
  return (
   <div className="max-w-4xl mx-auto px-4 py-8">
     <div className="flex items-center justify-between"><h1 className="text-2xl font-black text-slate-800">🏅 ランキング</h1><button onClick={onBack} className="btn px-4 py-2 border border-slate-300 bg-white text-slate-600">戻る</button></div>
     <div className="grid md:grid-cols-2 gap-4 mt-4">
       <div className="card p-5">
         <div className="font-bold text-slate-700 mb-2">🏢 部署別ランキング（合計改善ポイント）</div>
         {deptSum.length===0 && <div className="text-slate-400 text-sm">まだ記録がありません。</div>}
         {deptSum.map((d,i)=>(<div key={d.dept} className={`flex items-center justify-between py-2 border-b border-slate-100 ${me&&me.dept===d.dept?'bg-amber-50 rounded px-1':''}`}><span className="font-bold w-7 text-center">{i+1}</span><span className="flex-1 text-sm">{d.dept} <span className="text-xs text-slate-400">({d.n}人/平均{d.avg})</span></span><span className="font-black text-sky-600">{d.sum}</span></div>))}
       </div>
       <div className="card p-5">
         <div className="font-bold text-slate-700 mb-2">👤 個人ランキング（上位20）</div>
         {indiv.length===0 && <div className="text-slate-400 text-sm">まだ記録がありません。</div>}
         {indiv.map((e,i)=>{const r=rankOf(e.avg); const isMe=me&&e._id===me._id;
           return (<div key={i} className={`flex items-center justify-between py-2 border-b border-slate-100 ${isMe?'bg-amber-50 rounded px-1':''}`}><span className="font-bold w-7 text-center">{i+1}</span><span className="flex-1 text-sm">{e.name} <span className="text-xs text-slate-400">{e.dept}</span></span><span className="text-xs mr-2" style={{color:r.c}}>{r.ic}{r.nm}</span><span className="font-black text-emerald-600">{e.avg}</span></div>);})}
       </div>
     </div>
   </div>
  );
}

/* ===== 本体 ===== */
function App(){
  const [phase,setPhase]=useState('start'); // start|quiz|checkpoint|gameover|summary|ranking
  const [back,setBack]=useState('start');
  const [player,setPlayer]=useState(null);
  const [session,setSession]=useState([]);
  const [idx,setIdx]=useState(0);
  const [results,setResults]=useState([]);
  const [me,setMe]=useState(null);

  const start=(p)=>{ setPlayer(p); setSession(pickSession()); setIdx(0); setResults([]); setMe(null); setPhase('quiz'); };
  const finish=(all)=>{ const avg=Math.round(all.reduce((s,r)=>s+r.score,0)/all.length);
    const e={_id:'e'+Date.now()+Math.floor(Math.random()*1000),name:player.name,dept:player.dept,avg,date:Date.now()};
    saveEntry(e); pushShared(e); setMe(e); };
  const onDone=(res)=>{
    const all=[...results,res]; setResults(all);
    if(all.length>=SESSION_N){ finish(all); setPhase('summary'); }
    else setIdx(idx+1);
  };

  if(phase==='start') return <Start onStart={start} onRanking={()=>{setBack('start');setPhase('ranking');}}/>;
  if(phase==='ranking') return <Ranking me={me} onBack={()=>setPhase(back)}/>;
  if(phase==='summary') return <Summary player={player} results={results} clearedAll={true} onRanking={()=>{setBack('summary');setPhase('ranking');}} onRetry={()=>setPhase('start')}/>;

  return <Quiz key={idx} q={session[idx]} idx={idx} total={session.length} results={results} onDone={onDone}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
