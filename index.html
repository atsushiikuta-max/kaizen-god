const KPI_BASE = {rieki:6.5, nouki:72, furyo:8.5, seisan:58};
function calcKPI(results){
  let k = {...KPI_BASE};

    rieki:Math.max(0,Math.min(30,k.rieki)), nouki:Math.max(0,Math.min(100,k.nouki)),
    furyo:Math.max(0,Math.min(20,k.furyo)), seisan:Math.max(0,Math.min(100,k.seisan)),

/* ===== 採点（オフライン・ルールベース） ===== */
const norm = s => (s||'').toLowerCase().replace(/\s+/g,'').replace(/[、。・，．]/g,'');
function grade(q, ans){
  const a = norm(ans);
  const matched=[], missed=[]; let keyCovered=false;
  q.points.forEach(p=>{ const hit=p.kw.some(k=>a.includes(norm(k)));
    if(hit){ matched.push(p); if(p.key) keyCovered=true; } else missed.push(p); });
  const ngHits = NG.filter(n=>a.includes(norm(n)));
  const ratio = matched.length / q.points.length;
  let s = 40 + ratio*50 + (keyCovered?10:0) - ngHits.length*15;
  if(matched.length===0) s = Math.min(s, ans.trim().length>10?22:5);
  s = Math.max(0, Math.min(100, Math.round(s)));
  return {score:s, matched, missed, keyCovered, ngHits};
}

const shuffle = arr => { const a=arr.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; };
const yfmt = n => '¥'+(n||0).toLocaleString();
/* 上位概念が偏らないように9問を抽選（同一keyConceptは最大2問） */
function pickSession(){
  const sh=shuffle(POOL), out=[], cap={};
  for(const q of sh){ if(out.length>=SESSION_N) break; const k=q.keyConcept; if((cap[k]||0)>=2) continue; cap[k]=(cap[k]||0)+1; out.push(q); }
  for(const q of sh){ if(out.length>=SESSION_N) break; if(out.indexOf(q)<0) out.push(q); }
  return out;
}

/* ============ SVG チャート（見るべきグラフの図解） ============ */
function HistChart({variant}){
  const W=560,H=200,padL=30,padB=22,padT=8,padR=8;
  const step=0.2,setCT=37,warnCT=44;
  const cfg={
    bimodal:{min:36,max:48,mean:39.5,std:1.0,peak:16,m2:45},
    shiftRight:{min:36,max:48,mean:42,std:1.4,peak:16,m2:null},
    shiftLeft:{min:33,max:46,mean:35.4,std:0.9,peak:16,m2:null},
    wide:{min:34,max:48,mean:40,std:2.6,peak:11,m2:null},
  }[variant] || {min:36,max:48,mean:40,std:1.4,peak:16,m2:null};
  const {min,max,mean,std,peak,m2}=cfg, r2=0.95;
  const bins=[]; for(let x=min;x<=max+1e-9;x+=step){
    const i=Math.round((x-min)/step);
    let g=Math.exp(-((x-mean)**2)/(2*std*std));
    if(m2!=null) g=Math.max(g, r2*Math.exp(-((x-m2)**2)/(2*std*std)));
    const jit=0.8+0.2*Math.abs((Math.sin(i*12.9898)*43758.5453)%1);
    bins.push({x,c:Math.max(0,Math.round(peak*g*jit))});
  }
  const pw=W-padL-padR, ph=H-padT-padB, bw=pw/bins.length, mx=Math.max(...bins.map(b=>b.c),1);
  const xF=v=>padL+((v-min)/(max-min))*pw;
  return (
   <svg viewBox={`0 0 ${W} ${H}`} className="chart">
    {bins.map((b,i)=>{const y=padT+ph-(b.c/mx)*ph;return <rect key={i} x={padL+i*bw} y={y} width={Math.max(1,bw-1)} height={padT+ph-y} fill="#aac8ec"/>;})}
    <line x1={xF(setCT)} y1={padT} x2={xF(setCT)} y2={padT+ph} stroke="#1f4e9e" strokeDasharray="4 3"/>
    <text x={xF(setCT)+3} y={padT+11} style={{fontSize:10,fill:'#1f4e9e',fontWeight:700}}>設定CT {setCT}</text>
    <line x1={xF(warnCT)} y1={padT} x2={xF(warnCT)} y2={padT+ph} stroke="#c92a2a" strokeDasharray="4 3"/>
    <text x={xF(warnCT)-3} y={padT+11} textAnchor="end" style={{fontSize:10,fill:'#c92a2a',fontWeight:700}}>警告CT {warnCT}</text>
    {[min,mean,max].map((v,i)=><text key={i} x={xF(v)} y={H-6} textAnchor="middle" className="ax">{v.toFixed(1)}</text>)}
   </svg>
  );
}
function PowerChart(){
  const W=560,H=120,padL=8,padR=8,by=30,bh=38,s0=300,s1=1140; // 05:00-19:00 (分)
  const segs=[['05:00','08:00','idle'],['08:00','12:00','run'],['12:00','13:00','lunch'],['13:00','17:00','run'],['17:00','19:00','off']];
  const col={run:'#23b7e0',idle:'#e8590c',lunch:'#343a40',off:'#e8590c'};
  const lab={run:'稼働',idle:'待機(電源ON)',lunch:'昼休み',off:'終業後'};
  const tm=t=>{const[h,m]=t.split(':').map(Number);return h*60+m;};
  const pw=W-padL-padR, xF=t=>padL+((tm(t)-s0)/(s1-s0))*pw;
  const ticks=[]; for(let h=6;h<=18;h+=2)ticks.push(`${String(h).padStart(2,'0')}:00`);
  return (
   <svg viewBox={`0 0 ${W} ${H}`} className="chart">
    {segs.map((s,i)=><rect key={i} x={xF(s[0])} y={by} width={Math.max(1,xF(s[1])-xF(s[0]))} height={bh} fill={col[s[2]]}/>)}
    <rect x={padL} y={by} width={pw} height={bh} fill="none" stroke="#dce3ec"/>
    {ticks.map(t=><text key={t} x={xF(t)} y={by+bh+15} textAnchor="middle" className="ax">{t}</text>)}
    {['run','idle','lunch'].map((k,i)=>(
      <g key={k} transform={`translate(${padL+i*150},14)`}>
        <rect width="12" height="12" y="-10" rx="2" fill={col[k]}/><text x="16" y="0" className="lg">{lab[k]}</text>
      </g>))}
   </svg>
  );
}
function BarChart({data,hi}){
  const W=560,H=40+data.length*30,padL=120,padR=40,padT=10;
  const mx=Math.max(...data.map(d=>d[1]),1), pw=W-padL-padR;
  return (
   <svg viewBox={`0 0 ${W} ${H}`} className="chart">
    {data.map((d,i)=>{const y=padT+i*30, w=(d[1]/mx)*pw, fill=i===hi?'#ef4444':'#94a3b8';
      return (<g key={i}>
        <text x={padL-8} y={y+15} textAnchor="end" style={{fontSize:12,fill:'#334155'}}>{d[0]}</text>
        <rect x={padL} y={y+3} width={Math.max(2,w)} height={18} rx="3" fill={fill}/>
        <text x={padL+w+5} y={y+16} style={{fontSize:11,fill:'#64748b',fontWeight:700}}>{d[1]}</text>
      </g>);})}
   </svg>
  );
}
function GraphView({graph}){
  return (
   <div>
     {graph.kind==='hist' && <HistChart variant={graph.variant}/>}
     {graph.kind==='power' && <PowerChart/>}
     {graph.kind==='bar' && <BarChart data={graph.data} hi={graph.hi}/>}
     <div className="text-xs mt-1 wmark" style={{color:'#b45309'}}>👀 {graph.note}</div>
   </div>
  );
}

/* ===== KPI 経営ダッシュボード ===== */
function Bar({label,val,unit,max,good}){
  const pct=Math.max(0,Math.min(100,(val/max)*100));
  const col = good ? (pct>66?'#22c55e':pct>40?'#f59e0b':'#ef4444') : (pct<33?'#22c55e':pct<55?'#f59e0b':'#ef4444');
  return (
   <div className="mb-2">
     <div className="flex justify-between text-sm"><span className="text-slate-600">{label}</span><span className="font-black" style={{color:col}}>{val.toFixed(1)}{unit}</span></div>
     <div className="h-2 bg-slate-100 rounded-full overflow-hidden"><div className="h-full rounded-full" style={{width:pct+'%',background:col}}/></div>
   </div>
  );
}
function Dashboard({results, idx}){
  const k=calcKPI(results);
  const yen=results.reduce((s,r)=>s+yenOf(r.score),0);
  const avg=results.length?Math.round(results.reduce((s,r)=>s+r.score,0)/results.length):0;
  const rk=rankOf(avg);
  const nextCP=CHECKPOINTS.find(c=>c.at>idx)||CHECKPOINTS[CHECKPOINTS.length-1];
  return (
   <div className="card p-4">
     <div className="font-bold text-slate-700 flex items-center gap-1 mb-2">📊 経営ダッシュボード</div>
     <Bar label="利益率" val={k.rieki} unit="%" max={15} good/>
     <Bar label="納期遵守率" val={k.nouki} unit="%" max={100} good/>
     <Bar label="不良率" val={k.furyo} unit="%" max={15}/>
     <Bar label="生産性" val={k.seisan} unit="%" max={100} good/>
     <div className="border-t border-slate-100 mt-3 pt-3">
       <div className="font-bold text-slate-700 flex items-center gap-1 mb-1">🏅 昇進トラッカー</div>
       <div className="flex justify-between text-sm"><span className="text-slate-500">現在の称号</span><span className="font-black" style={{color:rk.c}}>{rk.ic}{rk.nm}</span></div>
       <div className="flex justify-between text-sm"><span className="text-slate-500">次のチェックポイント</span><span className="font-bold text-sky-700">CP{CHECKPOINTS.indexOf(nextCP)+1}（あと{Math.max(0,nextCP.at-idx)}問）</span></div>
       <div className="flex justify-between text-sm"><span className="text-slate-500">必達ライン(累計改善額)</span><span className="font-bold">{yfmt(yen)} / {yfmt(nextCP.target)}</span></div>
       <div className="h-2 bg-slate-100 rounded-full overflow-hidden mt-1"><div className="h-full rounded-full" style={{width:Math.min(100,yen/nextCP.target*100)+'%',background:yen>=nextCP.target?'#22c55e':'#f59e0b'}}/></div>
     </div>
   </div>
  );
}

/* ===== 弱点評価 ===== */
function weakness(results){
  const byType={}; results.forEach(r=>{(byType[r.type]=byType[r.type]||[]).push(r.score);});
  let worstType=null,worstAvg=101;
  Object.keys(byType).forEach(t=>{const a=byType[t].reduce((s,v)=>s+v,0)/byType[t].length; if(a<worstAvg){worstAvg=a;worstType=t;}});
  const keyMiss={}; results.forEach(r=>{ if(!r.keyCovered){keyMiss[r.keyConcept]=(keyMiss[r.keyConcept]||0)+1;} });
  const missConcepts=Object.keys(keyMiss).sort((a,b)=>keyMiss[b]-keyMiss[a]);
  return {worstType,worstAvg:Math.round(worstAvg),missConcepts,keyMiss};
}

/* ===== 総評 ===== */
function Summary({player,results,clearedAll,onRanking,onRetry}){
  const avg=Math.round(results.reduce((s,r)=>s+r.score,0)/results.length);
  const rk=rankOf(avg); const w=weakness(results);
  const yen=results.reduce((s,r)=>s+yenOf(r.score),0);
  return (
   <div className="max-w-2xl mx-auto px-4 py-10 text-center">
     {clearedAll && <div className="text-emerald-600 font-black mb-2">👑 全チェックポイント突破！工場改革コンプリート</div>}
     <div className="text-6xl">{rk.ic}</div>
     <div className="text-sm text-slate-500 mt-2">{player.dept} ／ {player.name} さんの称号</div>
     <div className="text-4xl font-black mt-1" style={{color:rk.c}}>{rk.nm}</div>

     <div className="flex gap-3 justify-center mt-6 flex-wrap">
       <div className="card p-5"><div className="text-slate-500 text-sm">総合（平均点）</div><div className="text-4xl font-black text-emerald-600">{avg}</div></div>
       <div className="card p-5"><div className="text-slate-500 text-sm">累計改善額</div><div className="text-4xl font-black text-sky-600">{yfmt(yen)}</div></div>
     </div>

     <div className="card p-5 mt-5 text-left">
       <div className="font-bold text-slate-700 mb-2">🔎 ここが弱いです（弱点分析）</div>
       {w.missConcepts.length>0
        ? <div className="text-sm text-slate-700">最重要視点の取りこぼし： {w.missConcepts.map(c=><Chip key={c} c={c}/>)}<div className="text-xs text-slate-500 mt-1">この視点が問われた時に改善案を出せていません。{w.missConcepts.includes('待ちを無くす')&&'電力問題は「動いていないのに電気を使っていないか？」で考えると見つかります。'}{w.missConcepts.includes('品番切替')&&'CTヒストグラムで山が2つの時は、まず品番切替を疑いましょう。'}</div></div>
        : <div className="text-sm text-emerald-700">最重要視点はすべて押さえられています。素晴らしい！</div>}
       <div className="text-sm text-slate-700 mt-3">最も苦手な出題タイプ： <b>{w.worstType}</b>（平均 {w.worstAvg}点）</div>
       <div className="text-xs text-slate-500 mt-2">ヒント：電力→「待ちを無くす」／CT→「待ちを無くす・同時に行う・距離を短く」／品質→「同時に行う・気遣いを無くす」で考える癖をつけましょう。</div>
     </div>

     <div className="card p-5 mt-5 text-left">
       <div className="font-bold text-slate-700 mb-2">各問の点数</div>
       {results.map((x,i)=>(<div key={i} className="flex justify-between border-b border-slate-100 py-1 text-sm"><span>第{i+1}問 <span className="text-slate-400">{x.type}</span></span><span className="font-bold">{x.score}点</span></div>))}
     </div>

     <div className="flex gap-3 justify-center mt-7"><button onClick={onRanking} className="btn px-6 py-3 text-white" style={{background:'linear-gradient(90deg,#0ea5e9,#22c55e)'}}>🏅 ランキングを見る</button><button onClick={onRetry} className="btn px-6 py-3 border border-slate-300 bg-white text-slate-700">もう一度</button></div>
   </div>
  );
}

/* ===== ランキング（個人＋部署別合計を同時表示） ===== */
function Ranking({me,onBack}){
  const [lb,setLb]=useState(null);
  useEffect(()=>{ let on=true; (async()=>{ const shared=await fetchShared(); const local=loadLB(); const map={}; shared.concat(local).forEach(e=>{ if(e&&e._id) map[e._id]=e; }); if(on) setLb(Object.values(map)); })(); return ()=>{on=false;}; },[]);
  if(lb===null) return (<div className="max-w-4xl mx-auto px-4 py-8"><div className="flex items-center justify-between"><h1 className="text-2xl font-black text-slate-800">🏅 ランキング</h1><button onClick={onBack} className="btn px-4 py-2 border border-slate-300 bg-white text-slate-600">戻る</button></div><div className="text-slate-400 mt-10 text-center">読み込み中…</div></div>);
  const indiv=lb.slice().sort((a,b)=>b.avg-a.avg||b.date-a.date).slice(0,20);
  const agg={}; lb.forEach(e=>{const g=agg[e.dept]=agg[e.dept]||{sum:0,n:0,best:0}; g.sum+=e.avg; g.n++; g.best=Math.max(g.best,e.avg);});
  const deptSum=Object.keys(agg).map(d=>({dept:d,sum:agg[d].sum,n:agg[d].n,avg:Math.round(agg[d].sum/agg[d].n)})).sort((a,b)=>b.sum-a.sum);
  return (
   <div className="max-w-4xl mx-auto px-4 py-8">
     <div className="flex items-center justify-between"><h1 className="text-2xl font-black text-slate-800">🏅 ランキング</h1><button onClick={onBack} className="btn px-4 py-2 border border-slate-300 bg-white text-slate-600">戻る</button></div>
     <div className="grid md:grid-cols-2 gap-4 mt-4">
       <div className="card p-5">
         <div className="font-bold text-slate-700 mb-2">🏢 部署別ランキング（合計改善ポイント）</div>
         {deptSum.length===0 && <div className="text-slate-400 text-sm">まだ記録がありません。</div>}
         {deptSum.map((d,i)=>(<div key={d.dept} className={`flex items-center justify-between py-2 border-b border-slate-100 ${me&&me.dept===d.dept?'bg-amber-50 rounded px-1':''}`}><span className="font-bold w-7 text-center">{i+1}</span><span className="flex-1 text-sm">{d.dept} <span className="text-xs text-slate-400">({d.n}人/平均{d.avg})</span></span><span className="font-black text-sky-600">{d.sum}</span></div>))}
       </div>
       <div className="card p-5">
         <div className="font-bold text-slate-700 mb-2">👤 個人ランキング（上位20）</div>
         {indiv.length===0 && <div className="text-slate-400 text-sm">まだ記録がありません。</div>}
         {indiv.map((e,i)=>{const r=rankOf(e.avg); const isMe=me&&e._id===me._id;
           return (<div key={i} className={`flex items-center justify-between py-2 border-b border-slate-100 ${isMe?'bg-amber-50 rounded px-1':''}`}><span className="font-bold w-7 text-center">{i+1}</span><span className="flex-1 text-sm">{e.name} <span className="text-xs text-slate-400">{e.dept}</span></span><span className="text-xs mr-2" style={{color:r.c}}>{r.ic}{r.nm}</span><span className="font-black text-emerald-600">{e.avg}</span></div>);})}
       </div>
     </div>
   </div>
  );
}

/* ===== 本体 ===== */
function App(){
  const [phase,setPhase]=useState('start'); // start|quiz|checkpoint|gameover|summary|ranking
  const [back,setBack]=useState('start');
  const [player,setPlayer]=useState(null);
  const [session,setSession]=useState([]);
  const [idx,setIdx]=useState(0);
  const [results,setResults]=useState([]);
  const [cp,setCp]=useState(null);
  const [me,setMe]=useState(null);

  const start=(p)=>{ setPlayer(p); setSession(pickSession()); setIdx(0); setResults([]); setMe(null); setPhase('quiz'); };
  const finish=(all,cleared)=>{ const avg=Math.round(all.reduce((s,r)=>s+r.score,0)/all.length);
    const e={_id:'e'+Date.now()+Math.floor(Math.random()*1000),name:player.name,dept:player.dept,avg,date:Date.now(),cleared};
    saveEntry(e); pushShared(e); setMe(e); };
  const onDone=(res)=>{
    const all=[...results,res]; setResults(all); const n=all.length;
    const cpDef=CHECKPOINTS.find(c=>c.at===n);
    if(cpDef){
      const yen=all.reduce((s,r)=>s+yenOf(r.score),0); const passed=yen>=cpDef.target;
      setCp({cpIndex:CHECKPOINTS.indexOf(cpDef),passed,yen,target:cpDef.target,isLast:n>=SESSION_N});
      setPhase('checkpoint');
    } else { setIdx(idx+1); }
  };
  const afterCP=()=>{
    if(!cp.passed){ finish(results,false); setPhase('gameover'); return; }
    if(cp.isLast){ finish(results,true); setPhase('summary'); return; }
    setIdx(idx+1); setPhase('quiz');
  };

  if(phase==='start') return <Start onStart={start} onRanking={()=>{setBack('start');setPhase('ranking');}}/>;
  if(phase==='ranking') return <Ranking me={me} onBack={()=>setPhase(back)}/>;
  if(phase==='checkpoint') return <Checkpoint {...cp} onContinue={afterCP} onGameover={afterCP}/>;
  if(phase==='gameover') return <Summary player={player} results={results} clearedAll={false} onRanking={()=>{setBack('gameover');setPhase('ranking');}} onRetry={()=>setPhase('start')}/>;
  if(phase==='summary') return <Summary player={player} results={results} clearedAll={true} onRanking={()=>{setBack('summary');setPhase('ranking');}} onRetry={()=>setPhase('start')}/>;

  return <Quiz key={idx} q={session[idx]} idx={idx} total={session.length} results={results} onDone={onDone}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
